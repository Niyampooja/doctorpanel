
<!DOCTYPE html>
<html>
<head>
    <title>Doctor Panel</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
    <!-- Flatpickr CSS -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">

<!-- Flatpickr JS -->
<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="d-flex">

    <!-- Sidebar -->
    <div class="sidebar p-3" id="sidebar">
        <h4 class="text-white">Doctor Panel

            <button class="btn btn-dark" onclick="toggleSidebar()">☰</button>
        </h4>
        
        <ul class="nav flex-column mt-4">
            <li class="nav-item" onclick="showSection('dashboard')">
                <i class="bi bi-speedometer2"></i> Dashboard
            </li>
            <li onclick="showSection('add')">
                <i class="bi bi-person-plus"></i> Add Patient
            </li>
            <li onclick="showSection('list')">
                <i class="bi bi-people"></i> Patients
            </li>
            
            <li onclick="showSection('appointment')">
                <i class="bi bi-calendar-check"></i> Appointments
            </li>
            <li onclick="showSection('records')">
                <i class="bi bi-file-earmark-medical"></i> Records
            </li>
            <li onclick="logout()">
                <i class="bi bi-box-arrow-right"></i> Logout
            </li>
        </ul>
    </div>

    <!-- Main -->
    <div class="flex-grow-1 p-4">

        <!-- Topbar -->
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2><i class="bi bi-person-badge-fill"></i> Welcome Doctor</h2>
            
        </div>

        <!-- Dashboard -->
        <div id="dashboardSection">

            <div class="row">

                <div class="col-md-4">
                    <div class="card shadow p-3 text-center" id="patientCard">
                        <h5>Total Patients</h5>
                        <h2 id="totalPatients">0</h2>
                    </div>
                </div>

                <div class="col-md-4">
                    <div class="card shadow p-3 text-center" id="appointmentCard">
                        <h5>Appointments</h5>
                        <h2 id="totalAppointments">0</h2>
                    </div>
                </div>

                <div class="col-md-4">
                    <div class="card shadow p-3 text-center" id="recordsCard">
                        <h5>Records</h5>
                        <h2 id="totalRecords">0</h2>
                    </div>
                </div>

            </div>

        </div>

        <!-- Add Patient -->
        <div id="addSection" style="display:none;">
            <h4>Add Patient</h4>
            <form id="patientForm" class="card p-3 shadow">
                <input class="form-control mb-2" id="name" placeholder="Name">
                <input class="form-control mb-2" id="age" placeholder="Age">
                <input class="form-control mb-2" id="gender" placeholder="Gender">
                <input class="form-control mb-2" id="phone" placeholder="Phone">
                <button class="btn btn-primary">Add</button>
            </form>
        </div>

          <!-- Add Appointment -->
        <div id="appointmentSection" style="display:none;">
    <h4>Appointments</h4>

    <!-- Appointment Form -->
    <form id="appointmentForm" class="card p-3 shadow">
        <select class="form-control mb-2" id="doctor_id" required>
            <option value="">Select Doctor</option>
        </select>

        <select class="form-control mb-2" id="patient_id" required>
            <option value="">Select Patient</option>
        </select>

        <input id="appointment_date" class="form-control" placeholder="Select Date & Time">
        <button class="btn btn-primary">Add Appointment</button>
    </form>

    <!-- Appointment Table -->
    <table class="table table-bordered" id="appointmentTable"></table>
</div>

        <div class="modal" tabindex="-1" id="editModal">
  <div class="modal-dialog">
    <div class="modal-content p-3">
      <h5>Edit Appointment</h5>
      <select class="form-control mb-2" id="edit_doctor_id"></select>
      <select class="form-control mb-2" id="edit_patient_id"></select>
      <input id="edit_appointment_date" class="form-control" placeholder="Select Date & Time">
      <select class="form-control mb-2" id="edit_status">
        <option value="pending">Pending</option>
        <option value="success">Success</option>
      </select>
      <button class="btn btn-success" id="saveEditBtn">Save</button>
      <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
    </div>
  </div>
</div>

        <!-- Patients -->
        <div id="listSection" style="display:none;">
            <h4>Patients</h4>
            <table class="table table-striped" id="table"></table>
        </div>

       

       <div id="recordsSection" style="display:none;">
            <h4>Add Medical Record</h4>
            <form id="recordForm" class="card p-3 shadow mb-3">
                <select class="form-control mb-2" id="record_patient_id" required>
                    <option value="">Select Patient</option>
                </select>

                <select class="form-control mb-2" id="record_doctor_id" required>
                    <option value="">Select Doctor</option>
                </select>

                <input class="form-control mb-2" type="text" id="record_date" placeholder="Select Date & Time" required>

                <textarea class="form-control mb-2" id="record_description" placeholder="Prescription" rows="4"></textarea>

                <button class="btn btn-primary">Add Record</button>
            </form>
     
                <h4>Medical Records</h4>
                <table class="table table-bordered" id="recordTable"></table>
            

        </div>

        <script>
        document.getElementById("patientCard").addEventListener("click", function() {
            showSection('list'); // Show Patients
        });

        document.getElementById("appointmentCard").addEventListener("click", function() {
            showSection('appointment'); // Show Appointments
        });

        // Assuming you add an ID for Records card, e.g., id="recordsCard"
        document.getElementById("recordsCard").addEventListener("click", function() {
            showSection('records'); // Show Records
        });
        </script>

        <script src="script.js"></script>
</body>
</html>
